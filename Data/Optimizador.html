<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Optimizador de Cortes</title>
    <link rel="icon" href="icono.png" />
    <link rel="stylesheet" href="fontawesome/css/all.min.css" />
    <link rel="stylesheet" href="css/templatemo-ocean-vibes.css" />
    <style>
      body {
        min-height: 100vh;
        background-color: #ffffff;
      }
      .page-header {
        text-align: center;
        color: #000000;
        padding: 24px 16px 12px;
      }
      .page-title {
        font-size: 36px;
        margin: 0;
      }
      .page-subtitle {
        margin: 8px auto 0;
        max-width: 800px;
        color: #ddd;
      }
      .page-card {
        background: rgba(255, 255, 255, 0.96);
        border-radius: 18px;
        box-shadow: 0 16px 45px rgba(0, 0, 0, 0.18);
        margin: 0 auto 40px;
        max-width: 1080px;
        padding: 26px;
      }
      .grid {
        display: grid;
        gap: 18px;
      }
      .grid-2 {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .form-group {
        display: grid;
        gap: 8px;
      }
      label {
        font-weight: 700;
        color: #333;
      }
      input[type="text"],
      input[type="number"] {
        width: 100%;
        padding: 12px 14px;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 15px;
      }
      button {
        cursor: pointer;
        border: none;
        border-radius: 10px;
        padding: 12px 18px;
        font-size: 15px;
        font-weight: 700;
      }
      .btn-primary {
        background: #0096ff;
        color: white;
      }
      .btn-secondary {
        background: #333;
        color: white;
      }
      .btn-group {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }
      .result-box {
        padding: 18px;
        border-radius: 14px;
        background: #f7f9fc;
        border: 1px solid #d8e2ef;
      }
      .result-box h3 {
        margin-top: 0;
      }
      .warning {
        color: #b31b1b;
        font-weight: 700;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 12px;
      }
      th,
      td {
        padding: 10px 12px;
        border: 1px solid #dde4ee;
        text-align: left;
        font-size: 14px;
      }
      th {
        background: #f1f6ff;
      }
      .panel-card {
        border-radius: 14px;
        border: 1px solid #d8e2ef;
        padding: 16px;
        background: #ffffff;
      }
      .panel-visual {
        margin: 18px auto 0;
        border: 1px solid #9bb8de;
        border-radius: 14px;
        background: #f6f9ff;
        padding: 12px;
        max-width: 100%;
      }
      .panel-visual-label {
        margin-bottom: 10px;
        font-size: 14px;
        color: #334a6f;
        font-weight: 700;
      }
      .panel-drawing {
        margin: 0 auto;
        display: grid;
        grid-template-columns: minmax(0, 1.4fr) minmax(280px, 0.8fr);
        gap: 18px;
        align-items: start;
      }
      .panel-info {
        display: grid;
        gap: 12px;
      }
      .summary-box {
        padding: 16px;
        border-radius: 14px;
        background: #f1f6ff;
        border: 1px solid #d8e2ef;
        margin-bottom: 18px;
      }
      .panel-summary {
        padding: 14px;
        border-radius: 14px;
        background: #ffffff;
        border: 1px solid #d8e2ef;
      }
      #piecesInfo {
        max-height: 260px;
        overflow-y: auto;
      }
      .panel-drawing {
        position: relative;
        width: 100%;
        background: #f4f6f8; /* gris claro */
        box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.06);
        border-radius: 10px;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .panel-drawing-inner {
        position: relative;
        transform-origin: top left;
        /* fondo y borde para mostrar claramente los límites del panel */
        background: #ffffff;
        border: 2px solid rgba(0, 0, 0, 0.08);
        border-radius: 8px;
        box-sizing: content-box;
        max-width: 100%;
        max-height: 100%;
      }
      .piece-block {
        position: absolute;
        border: 1px solid rgba(0, 150, 255, 0.85);
        background: rgba(0, 150, 255, 0.15);
        color: #053a6b;
        font-size: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        box-sizing: border-box;
        overflow: visible;
        z-index: 2;
        padding: 2px;
      }

      .piece-block .opt-name {
        position: absolute;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-weight: 600;
        font-size: 10px;
        line-height: 1;
        white-space: nowrap;
        text-overflow: ellipsis;
        overflow: hidden;
        max-width: 90%;
        max-height: 90%;
        background: transparent;
        border: none;
        padding: 0;
        margin: 0;
        color: #053a6b;
        z-index: 3;
      }

      .piece-block .opt-name-horizontal {
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) rotate(0deg);
        width: calc(100% - 6px);
      }

      .piece-block .opt-name-vertical {
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        writing-mode: vertical-rl;
        text-orientation: sideways;
        height: calc(100% - 8px);
        max-height: calc(100% - 8px);
        width: auto;
        max-width: 90%;
      }

      .piece-block .opt-edge-label {
        position: absolute;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: transparent;
        border: none;
        color: #053a6b;
        font-size: 10px;
        font-weight: 600;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        line-height: 1;
        white-space: nowrap;
        padding: 0;
        margin: 0;
        pointer-events: none;
        z-index: 3;
      }

      .piece-block .opt-width-label {
        top: 1px;
        left: 50%;
        transform: translate(-50%, 0);
      }

      .piece-block .opt-height-label {
        left: 100%;
        top: 50%;
        transform: translate(0, -50%) rotate(90deg);
        transform-origin: top left;
      }
      .waste-rect {
        position: absolute;
        border: 1px dashed rgba(211, 47, 47, 0.85);
        background: rgba(255, 82, 82, 0.08);
        box-sizing: border-box;
        pointer-events: none;
        z-index: 1;
      }
      .piece-block.overflow-piece {
        border: 1px dashed rgba(211, 47, 47, 0.9);
        background: rgba(211, 47, 47, 0.08);
        color: #8b0000;
      }
      .skipped-piece {
        border: 1px dashed rgba(211, 47, 47, 0.9);
        border-radius: 8px;
        padding: 8px 10px;
        margin-bottom: 6px;
        background: rgba(255, 235, 238, 0.7);
        list-style: none;
      }
      #advancedOptions {
        max-height: 0;
        overflow: hidden;
        transition:
          max-height 0.4s ease-out,
          opacity 0.4s ease-out;
        opacity: 0;
        border: 1px solid #eee;
        border-top: none;
        background: #fbfbfb;
      }
      #advancedOptions.open {
        max-height: 500px;
        opacity: 1;
        padding: 10px;
      }
      #toggleAdvanced {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 10px 14px;
        background: #f0f0f0;
        color: #333;
        border: 1px solid #ddd;
        border-radius: 10px 10px 0 0;
        font-weight: 600;
        transition: all 0.3s ease;
      }
      #toggleAdvanced:hover {
        background: #e0e0e0;
      }
      #toggleAdvanced::after {
        content: "▼";
        transition: transform 0.4s ease;
      }
      #toggleAdvanced.open::after {
        transform: rotate(180deg);
      }
      #btnAdvancedHelp {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 10px 14px;
        background: #fff8e1;
        color: #5a4f00;
        border: 1px solid #fde293;
        border-radius: 0 0 10px 10px;
        font-weight: 600;
      }
      #btnAdvancedHelp:hover {
        background: #fff3bf;
      }
      .help-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 100000;
      }
      .help-panel {
        width: min(760px, 95%);
        max-height: 90vh;
        overflow-y: auto;
        background: white;
        border-radius: 18px;
        padding: 22px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.22);
      }
      .help-panel h2 {
        margin-top: 0;
      }
      .help-panel details {
        border: 1px solid #ddd;
        border-radius: 10px;
        padding: 14px 16px;
        margin-bottom: 12px;
        background: #f9fbff;
      }
      .help-panel summary {
        font-weight: 700;
        cursor: pointer;
        outline: none;
      }
      .help-panel summary::-webkit-details-marker {
        display: none;
      }
      .help-panel summary::before {
        content: "▶";
        display: inline-block;
        margin-right: 10px;
        transform: rotate(0deg);
        transition: transform 0.2s ease;
      }
      .help-panel details[open] summary::before {
        transform: rotate(90deg);
      }
      .help-panel p,
      .help-panel li,
      .help-panel dd {
        margin: 0.75em 0 0;
        line-height: 1.5;
        color: #333;
      }
      .help-panel dt {
        font-weight: 700;
        margin-top: 0.85em;
      }
      .help-panel button {
        margin-top: 18px;
        width: 100%;
      }
      .status-message {
        margin-top: 14px;
        padding: 14px 16px;
        border-radius: 12px;
        background: #f1f6ff;
        color: #0d3b66;
      }
      .nav-links {
        display: flex;
        justify-content: center;
        gap: 12px;
        margin-bottom: 24px;
        flex-wrap: wrap;
      }
      .nav-links a {
        color: white;
        text-decoration: none;
        padding: 12px 18px;
        border-radius: 10px;
        background: #0096ff;
        transition: background 0.2s ease;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      .nav-links a:hover {
        background: #0077cc;
      }
      #a4PrintRoot {
        display: none;
      }
      .print-sheet {
        width: 210mm;
        height: 297mm;
        padding: 0;
        margin: 0;
        box-sizing: border-box;
        display: block;
        page-break-after: always;
        break-after: page;
        page-break-inside: avoid;
        break-inside: avoid;
      }
      .print-sheet-card {
        width: 100%;
        height: 100%;
        border: 0;
        border-radius: 0;
        padding: 0.2mm;
        background: #ffffff;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        gap: 0.2mm;
        overflow: hidden;
      }
      .print-sheet-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 4px;
        font-weight: 700;
        color: #0d3b66;
        font-size: 2.2mm;
        padding: 0;
        margin: 0;
      }
      .print-sheet-body {
        flex: 1;
        min-height: 0;
        display: block;
        width: 100%;
        height: 100%;
      }
      .print-sheet-svg {
        display: block;
        width: 100%;
        height: 100%;
        background: #ffffff;
      }
      .print-sheet-svg .panel-outline {
        fill: #ffffff;
        stroke: rgba(0, 0, 0, 0.16);
        stroke-width: 0.16mm;
      }
      .print-sheet-svg .piece {
        fill: rgba(0, 150, 255, 0.12);
        stroke: rgba(0, 150, 255, 0.7);
        stroke-width: 0.1mm;
      }
      .print-sheet-svg .piece-label {
        fill: #053a6b;
        font: 600 3.2px sans-serif;
        text-anchor: middle;
        dominant-baseline: middle;
      }
      .print-sheet-svg .edge-label {
        fill: #053a6b;
        font: 600 2.3px sans-serif;
      }
      .print-panel-visual {
        width: 100%;
        max-width: 100%;
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        display: block;
        background: transparent;
        border: 0;
        border-radius: 0;
        box-shadow: none;
      }
      .print-panel-visual .panel-visual-label {
        font-size: 2.8mm;
        margin-bottom: 0.8mm;
        padding: 0;
        border: 0;
        border-radius: 0;
        background: transparent;
        width: fit-content;
      }
      .print-panel-visual .panel-drawing {
        width: fit-content;
        max-width: 100%;
        max-height: 100%;
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        background: transparent;
        border: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .print-panel-visual .panel-drawing-inner {
        border-width: 0.2mm;
        background: #ffffff;
        box-shadow: none;
      }
      .print-panel-visual .piece-block {
        font-size: 2.2mm;
      }
      .print-panel-visual .piece-block .opt-name {
        font-size: 2.1mm;
      }
      .print-panel-visual .piece-block .opt-edge-label {
        font-size: 2mm;
      }
      @page {
        size: A4 portrait;
        margin: 0;
      }
      @page landscapePage {
        size: A4 landscape;
        margin: 8mm;
      }
      @page portraitPage {
        size: A4 portrait;
        margin: 8mm;
      }
      @media print {
        body.a4-printing {
          background: #ffffff !important;
          margin: 0;
        }
        body.a4-printing > :not(#a4PrintRoot) {
          display: none !important;
        }
        #a4PrintRoot {
          display: block !important;
        }
        .print-sheet {
          min-height: auto;
          padding: 0;
          margin: 0;
        }
        .print-sheet.landscape {
          page: landscapePage;
        }
        .print-sheet.portrait {
          page: portraitPage;
        }
      }
      @media (max-width: 830px) {
        .grid-2 {
          grid-template-columns: 1fr;
        }
      }
      /* Mantener la lista de piezas con tamaño fijo y scroll interno */
      #piecesInfo {
        max-height: 260px;
        overflow-y: auto;
      }
    </style>
  </head>
  <body>
    <header class="tm-site-header page-header">
      <h1 class="page-title">Optimizador de Cortes</h1>
    </header>

    <main class="page-card">
      <div class="nav-links">
        <a href="index.html"><i class="fas fa-home"></i> Inicio</a>
        <a href="Crear_Plantilla.html"
          ><i class="fas fa-file-alt"></i> Crear Plantilla</a
        >
      </div>
      <div class="grid grid-2">
        <div class="panel-card">
          <h2>1. Cargar proyecto</h2>
          <p>
            El optimizador usa los proyectos guardados por
            <strong>Crear Plantilla</strong>.
          </p>
          <div class="btn-group">
            <button class="btn-primary" id="btnLoadProject">
              <i class="fas fa-upload"></i> Cargar proyecto
            </button>
          </div>
          <div
            id="projectInfo"
            class="status-message"
            style="display: none"
          ></div>
          <div
            id="piecesInfo"
            class="result-box"
            style="display: none; margin-top: 16px"
          ></div>
        </div>

        <div class="panel-card">
          <h2>2. Datos de corte</h2>

          <div class="form-group">
            <label for="panelWidth">Ancho del panel</label>
            <input
              type="number"
              id="panelWidth"
              placeholder="Ej. 180"
              min="1"
            />
          </div>
          <div class="form-group">
            <label for="panelHeight">Alto del panel</label>
            <input
              type="number"
              id="panelHeight"
              placeholder="Ej. 260"
              min="1"
            />
          </div>
          <div class="form-group">
            <label for="panelCount">Cantidad de paneles</label>
            <input type="number" id="panelCount" placeholder="Ej. 2" min="1" />
          </div>

          <div
            class="btn-group"
            style="
              margin-top: 12px;
              display: flex;
              gap: 8px;
              align-items: flex-start;
              flex-wrap: wrap;
            "
          >
            <div
              style="
                display: flex;
                flex-direction: column;
                gap: 0;
                flex: 1;
                min-width: 200px;
              "
            >
              <button
                class="btn-secondary"
                id="btnOptimize"
                style="border-radius: 10px 10px 0 0"
              >
                <i class="fas fa-cogs"></i> Optimizar cortes
              </button>
              <button id="toggleAdvanced">Opciones avanzadas</button>
              <button id="btnAdvancedHelp">
                ¿Qué significan estas opciones?
              </button>
              <div
                id="advancedOptions"
                style="border-radius: 0 0 10px 10px; border-top: 1px solid #ccc"
              >
                <div class="form-group">
                  <label for="strategyMode">Estrategia de optimización</label>
                  <select id="strategyMode">
                    <option value="auto">Automática</option>
                    <option value="optimal">Optimal</option>
                    <option value="exhaustive">Exhaustiva (lenta)</option>
                    <option value="maxside">Maxside</option>
                    <option value="area">Area</option>
                    <option value="width">Width</option>
                    <option value="minside">Minside</option>
                    <option value="random">Random</option>
                  </select>
                </div>
                <div class="form-group">
                  <label for="orientationMode">Orientación de piezas</label>
                  <select id="orientationMode">
                    <option value="auto">Auto</option>
                    <option value="vertical">Vertical</option>
                    <option value="horizontal">Horizontal</option>
                    <option value="mixed">Mixta</option>
                  </select>
                </div>
                <div class="form-group">
                  <label for="cutStrategy">Estrategia de corte</label>
                  <select id="cutStrategy">
                    <option value="auto">Auto</option>
                    <option value="vertical">
                      Tiras verticales (derecha/abajo)
                    </option>
                    <option value="horizontal">
                      Tiras horizontales (abajo/derecha)
                    </option>
                    <option value="mixed">Mixta (ambas direcciones)</option>
                  </select>
                </div>
                <div
                  class="form-group"
                  style="display: flex; align-items: center; gap: 10px"
                >
                  <input type="checkbox" id="preferCuts" />
                  <label for="preferCuts" style="margin: 0; font-weight: 600"
                    >Preferir menos cortes</label
                  >
                </div>
                <div class="form-group">
                  <label for="sawThickness">Espesor de sierra (mm)</label>
                  <input
                    type="number"
                    id="sawThickness"
                    placeholder="Ej. 4"
                    min="0"
                    step="0.1"
                  />
                </div>
              </div>
            </div>
            <div
              style="
                display: flex;
                flex-direction: column;
                align-items: stretch;
                gap: 8px;
                margin-left: 0;
              "
            >
              <button
                class="btn-secondary"
                id="btnReassign"
                title="Intentar reubicar últimas piezas"
              >
                Reubicar últimos
              </button>
              <input
                type="number"
                id="reassignCount"
                placeholder="Reubicar últimos N"
                min="1"
                value="2"
                style="
                  width: 120px;
                  padding: 8px;
                  border-radius: 8px;
                  border: 1px solid #ccc;
                "
              />
              <input
                type="number"
                id="exhaustiveTimeoutMs"
                placeholder="Timeout búsqueda (ms)"
                min="100"
                value="5000"
                style="
                  width: 120px;
                  padding: 8px;
                  border-radius: 8px;
                  border: 1px solid #ccc;
                "
              />
              <input
                type="number"
                id="exhaustiveMaxNodes"
                placeholder="Máx nodos búsqueda"
                min="100"
                value="100000"
                style="
                  width: 120px;
                  padding: 8px;
                  border-radius: 8px;
                  border: 1px solid #ccc;
                "
              />
            </div>
          </div>

          <p style="margin-top: 14px; color: #555; font-size: 14px">
            Si las piezas no entran en los paneles, verás un aviso claro. Para
            búsqueda exhaustiva, configura timeout (ms) y máximo nodos.
          </p>
        </div>
      </div>

      <section id="resultsSection" style="display: none; margin-top: 28px">
        <div class="result-box">
          <h2>Resultados</h2>
          <div id="resultsMessage" class="status-message"></div>
          <div class="btn-group" style="margin-top: 12px">
            <button class="btn-secondary" id="btnPrintA4">
              <i class="fas fa-print"></i> Imprimir A4
            </button>
          </div>
          <div id="panelsResult"></div>
        </div>
      </section>
    </main>

    <script>
      const STORAGE_KEY = "plantillaProyectos";
      const SETTINGS_KEY = "optimizadorCutSettings";
      let proyectoCargado = null;
      let piezas = [];
      let ultimoResultado = null;
      let ultimoOptimizationParams = null;

      function obtenerProyectos() {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return [];
        try {
          return JSON.parse(raw).proyectos || [];
        } catch (err) {
          return [];
        }
      }

      function obtenerConfiguracionOptimizador() {
        const raw = localStorage.getItem(SETTINGS_KEY);
        if (!raw) return null;
        try {
          return JSON.parse(raw);
        } catch (err) {
          return null;
        }
      }

      function guardarConfiguracionOptimizador(config) {
        try {
          localStorage.setItem(SETTINGS_KEY, JSON.stringify(config || {}));
        } catch (err) {
          console.warn(
            "No fue posible guardar la configuración del optimizador.",
            err,
          );
        }
      }

      function cargarConfiguracionOptimizador() {
        const config = obtenerConfiguracionOptimizador();
        if (!config) return;

        const panelWidth = document.getElementById("panelWidth");
        const panelHeight = document.getElementById("panelHeight");
        const panelCount = document.getElementById("panelCount");
        const sawThickness = document.getElementById("sawThickness");
        const strategyMode = document.getElementById("strategyMode");
        const orientationMode = document.getElementById("orientationMode");
        const cutStrategy = document.getElementById("cutStrategy");
        const preferCuts = document.getElementById("preferCuts");
        const reassignCount = document.getElementById("reassignCount");

        if (config.panelWidth != null) panelWidth.value = config.panelWidth;
        if (config.panelHeight != null) panelHeight.value = config.panelHeight;
        if (config.panelCount != null) panelCount.value = config.panelCount;
        if (config.sawThickness != null)
          sawThickness.value = config.sawThickness;
        if (config.strategyMode != null)
          strategyMode.value = config.strategyMode;
        if (config.orientationMode != null)
          orientationMode.value = config.orientationMode;
        if (config.cutStrategy != null) cutStrategy.value = config.cutStrategy;
        if (config.preferCuts != null) preferCuts.checked = config.preferCuts;
        if (config.reassignCount != null)
          reassignCount.value = config.reassignCount;
      }

      function iniciarPersistenciaOptimizador() {
        const fields = [
          "panelWidth",

          "panelCount",
          "sawThickness",

          "cutStrategy",
          "reassignCount",
        ];
        fields.forEach((id) => {

          });
        });

      function parseSize(value) {
        if (value == null) return 0;
        if (typeof value === "number") return value;
        const n = parseFloat(
          String(value).replace(",", ".").replace("px", "").trim(),
        );
        return Number.isFinite(n) ? n : 0;
      }

      function getPieceAttribute(pieza, name) {
        if (!pieza || !pieza.attributes) return null;
        return (
          pieza.attributes[`data-${name}`] ||
          pieza.attributes[`data-${name.toLowerCase()}`] ||
          null
        );
      }

      function parseStyleSize(value) {
        if (value == null) return 0;
        if (typeof value === "number") return value;
        if (typeof value === "string") {
          const match = value.match(/([0-9]+(?:\.[0-9]+)?)(?:px)?/i);
          if (match) return parseSize(match[1]);
        }
        return 0;
      }

      function parsePieceNameFromHTML(html) {
        if (!html) return null;
        const temp = document.createElement("div");
        temp.innerHTML = html;
        return (
          temp.querySelector(".nombre-pieza")?.innerText?.trim() ||
          temp.querySelector(".pieza-nombre")?.innerText?.trim() ||
          null
        );
      }

      function getPieceDimensions(pieza) {
        // Si es un objeto JSON de datosA4, usa width/height directos
        if (
          typeof pieza.width === "number" &&
          typeof pieza.height === "number"
        ) {
          console.log(
            "  ✓ Usando width/height directo del JSON:",
            pieza.width,
            "x",
            pieza.height,
          );
          return {
            width: pieza.width,
            height: pieza.height,
            m1: 0,
            m2: 0,
            m3: 0,
            persp: "superior",
          };
        }

        console.warn(
          "  ! Pieza sin width/height numérico directo. Integrando atributos:",
          {
            width: pieza.width,
            height: pieza.height,
            tipo_width: typeof pieza.width,
            tipo_height: typeof pieza.height,
            attributes: pieza.attributes,
          },
        );

        const m1 = parseSize(
          getPieceAttribute(pieza, "m1") || getPieceAttribute(pieza, "med1"),
        );
        const m2 = parseSize(
          getPieceAttribute(pieza, "m2") || getPieceAttribute(pieza, "med2"),
        );
        const m3 = parseSize(getPieceAttribute(pieza, "m3"));
        const widthAttr = parseSize(getPieceAttribute(pieza, "w"));
        const heightAttr = parseSize(getPieceAttribute(pieza, "h"));
        const persp = (
          getPieceAttribute(pieza, "displaypersp") ||
          getPieceAttribute(pieza, "display-persp") ||
          getPieceAttribute(pieza, "persp") ||
          getPieceAttribute(pieza, "displayPersp") ||
          "superior"
        ).toLowerCase();

        // Para optimización siempre usar m1 como largo (width) y m2 como ancho (height).
        // Ignorar m3 (profundidad) en el cálculo de cabe en panel.
        let width = 0;
        let height = 0;

        if (m1 && m2) {
          width = m1;
          height = m2;
        }

        // Si no hay m1/m2, caer a los atributos de visualización (w/h)
        if ((!width || !height) && (widthAttr || heightAttr)) {
          if (!width && widthAttr) width = widthAttr;
          if (!height && heightAttr) height = heightAttr;
        }

        // Último recurso: atributos style/width/height y atributos serializados
        if ((!width || !height) && pieza) {
          try {
            if (pieza.style) {
              const styleW = parseStyleSize(pieza.style.width || "");
              const styleH = parseStyleSize(pieza.style.height || "");
              if (!width && styleW) width = styleW;
              if (!height && styleH) height = styleH;
            }

            if ((!width || !height) && pieza.attributes) {
              const attrW = parseSize(
                getPieceAttribute(pieza, "width") ||
                  getPieceAttribute(pieza, "W"),
              );
              const attrH = parseSize(
                getPieceAttribute(pieza, "height") ||
                  getPieceAttribute(pieza, "H"),
              );
              if (!width && attrW) width = attrW;
              if (!height && attrH) height = attrH;
            }
          } catch (err) {
            console.warn(
              "Optimizador: error leyendo estilos/atributos de pieza",
              err,
            );
          }
        }

        return {
          width: width || 0,
          height: height || 0,
          m1: m1 || 0,
          m2: m2 || 0,
          m3: m3 || 0,
          persp,
        };
      }

      function extraerPiezasA4(proyecto) {
        if (
          proyecto &&
          proyecto.datosA4 &&
          Array.isArray(proyecto.datosA4.modulos) &&
          proyecto.datosA4.modulos.length > 0
        ) {
          const lista = [];
          proyecto.datosA4.modulos.forEach((mod, modIdx) => {
            if (!mod || !Array.isArray(mod.filas)) return;

            mod.filas.forEach((fila, idx) => {
              const name =
                fila.nombre ||
                fila.nombreVal ||
                `mod-${modIdx + 1}-fila-${idx + 1}`;
              const width = parseSize(fila.med1 || fila.m1 || fila.w);
              const height = parseSize(fila.med2 || fila.m2 || fila.h);
              let qty = parseInt(fila.cantidad, 10);
              if (!Number.isFinite(qty) || qty <= 0) qty = 1;
              if (width <= 0 || height <= 0) {
                console.warn(
                  "Optimizador: fila de módulo sin dimensiones válidas:",
                  { mod: mod.nombre || modIdx, fila: idx + 1, fila },
                );
                return;
              }
              for (let n = 0; n < qty; n++) {
                lista.push({
                  id:
                    `mod-${modIdx + 1}-fila-${idx + 1}` +
                    (qty > 1 ? `#${n + 1}` : ""),
                  name,
                  width,
                  height,
                  original: fila,
                });
              }
            });
          });

          console.log(
            "Optimizador: Extraídas desde modulos A4",
            lista.length,
            "piezas (contando cantidades)",
          );
          return lista;
        }

        // 2) Fallback: paginasPiezas (wrappers exportados)
        if (
          Array.isArray(proyecto.datosA4.paginasPiezas) &&
          proyecto.datosA4.paginasPiezas.length > 0
        ) {
          const paginasConPiezas = proyecto.datosA4.paginasPiezas;
          const totalPiezasGuardadas = paginasConPiezas.reduce(
            (sum, p) => sum + (p.piezas?.length || 0),
            0,
          );
          console.log(
            "Optimizador: Encontradas",
            paginasConPiezas.length,
            "páginas con",
            totalPiezasGuardadas,
            "piezas totales (paginasPiezas)",
          );

          const lista = [];
          paginasConPiezas.forEach((pagina, pageIndex) => {
            if (!Array.isArray(pagina.piezas)) return;
            pagina.piezas.forEach((pieza, index) => {
              const name =
                parsePieceNameFromHTML(pieza.innerHTML) ||
                getPieceAttribute(pieza, "nombre") ||
                getPieceAttribute(pieza, "name") ||
                pieza.id ||
                `página-${pageIndex + 1}-pieza-${index + 1}`;
              const dims = getPieceDimensions(pieza);
              if (dims.width <= 0 || dims.height <= 0) return;

              // Determinar cantidad: múltiples fuentes posibles
              let qty = 1;
              const q1 =
                getPieceAttribute(pieza, "cantidad") ||
                getPieceAttribute(pieza, "qty");
              const q2 =
                pieza.attributes &&
                (pieza.attributes["data-cantidad"] ||
                  pieza.attributes["data-qty"] ||
                  pieza.attributes["cantidad"] ||
                  pieza.attributes["qty"]);
              const qVal = q1 || q2 || null;
              if (qVal != null) {
                const parsed = parseInt(
                  String(qVal).replace(/[^0-9\-]/g, ""),
                  10,
                );
                if (Number.isFinite(parsed) && parsed > 0) qty = parsed;
              }

              for (let n = 0; n < qty; n++) {
                lista.push({
                  id:
                    (pieza.id || `página-${pageIndex + 1}-pieza-${index + 1}`) +
                    (qty > 1 ? `#${n + 1}` : ""),
                  name,
                  width: dims.width,
                  height: dims.height,
                  original: pieza,
                });
              }
            });
          });

          console.log(
            "Optimizador: Extraídas",
            lista.length,
            "piezas A4 con dimensiones válidas (paginasPiezas)",
          );
          return lista;
        }

        // 3) Último recurso: no hay datos A4 útiles
        console.log(
          "Optimizador: No hay datos A4 útiles (modulos ni paginasPiezas)",
        );
        return [];
      }

      function extraerPiezas(proyecto) {
        const piezasA4 = extraerPiezasA4(proyecto);
        if (piezasA4.length > 0) {
          return piezasA4;
        }

        if (
          !proyecto ||
          !proyecto.datosDrawing ||
          !Array.isArray(proyecto.datosDrawing.piezas)
        )
          return [];

        const lista = proyecto.datosDrawing.piezas
          .map((pieza, index) => {
            const name =
              parsePieceNameFromHTML(pieza.innerHTML) ||
              getPieceAttribute(pieza, "nombre") ||
              getPieceAttribute(pieza, "name") ||
              pieza.id ||
              `pieza-${index + 1}`;
            const dims = getPieceDimensions(pieza);
            return {
              id: pieza.id || `pieza-${index + 1}`,
              name,
              width: dims.width,
              height: dims.height,
              original: pieza,
            };
          })
          .filter((p) => p.width > 0 && p.height > 0);
        return lista;
      }
